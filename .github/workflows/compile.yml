name: Compile SAMP Server

on: push

jobs:
  compile:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install PAWN Compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pawn

      - name: Compile main.pwn
        run: |
          pawncc main.pwn \
            -i includes \
            -i pawno/include \
            -o main.amx

      - name: Upload main.amx
        uses: actions/upload-artifact@v4
        with:
          name: main-amx
          path: main.amx
