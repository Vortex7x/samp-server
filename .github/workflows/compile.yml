name: Compile SAMP Server
on: push

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++ make

      - name: Build PAWN Compiler
        run: |
          git clone --recurse-submodules https://github.com/pawn-lang/compiler.git /tmp/pawnc
          CMAKE_DIR=$(dirname "$(find /tmp/pawnc -name 'CMakeLists.txt' -maxdepth 3 | head -1)")
          cmake "$CMAKE_DIR" -B /tmp/pawnc_build
          cmake --build /tmp/pawnc_build -j$(nproc)
          sudo cp "$(find /tmp/pawnc_build -name 'pawncc' | head -1)" /usr/local/bin/pawncc
          sudo chmod +x /usr/local/bin/pawncc

      - name: Compile
        run: pawncc main.pwn -i includes -i pawno/include -o main.amx

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: main-amx
          path: main.amx
